[pytest]
# CNP Gateway test configuration
# Audit fix P0-02: this file was a comment block — now an actual config.

asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage gate: CI fails if coverage drops below 60%.
# Raise this target each phase: Phase 1=60, Phase 2=70, Phase 3=80, Phase 4=85.
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=60
    -v
    --tb=short

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning:asyncio_mqtt
    ignore::pytest.PytestUnraisableExceptionWarning
