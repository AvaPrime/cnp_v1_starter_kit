name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install ruff

      - name: ruff check
        run: ruff check gateway/app --select E,F,W,I,UP,B,C4

  # ── 2. Type check ──────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r gateway/requirements.txt mypy

      - name: mypy
        working-directory: gateway
        run: mypy app --ignore-missing-imports --no-strict-optional

  # ── 3. Security scan ───────────────────────────────────────────────────────
  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install bandit pip-audit

      - name: bandit — production code only
        run: bandit -r gateway/app -ll -x gateway/tests
        # -ll = only report MEDIUM and above severity

      - name: pip-audit
        run: pip-audit -r gateway/requirements.txt --ignore-vuln GHSA-placeholder

  # ── 4. Test + Coverage ────────────────────────────────────────────────────
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    env:
      BOOTSTRAP_TOKEN: ci-bootstrap-token-not-real
      ADMIN_TOKEN: ci-admin-token-not-real
      GATEWAY_DB_PATH: ":memory:"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r gateway/requirements.txt

      - name: Run tests
        working-directory: gateway
        run: pytest
        # pytest.ini configures: --cov=app --cov-fail-under=60 --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: gateway/coverage.xml

  # ── 5. Docker build check ─────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]  # only build if lint + tests pass
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cnp-gateway:ci -f gateway/Dockerfile gateway/

      - name: Smoke test container
        run: |
          docker run --rm -d \
            -e BOOTSTRAP_TOKEN=ci-token \
            -e ADMIN_TOKEN=ci-admin \
            -p 8080:8080 \
            --name cnp-ci-test \
            cnp-gateway:ci
          sleep 3
          curl -f http://localhost:8080/api/health || (docker logs cnp-ci-test && exit 1)
          docker stop cnp-ci-test

  # ── 6. Check for committed secrets/DB files ───────────────────────────────
  hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No .db files committed
        run: |
          if find . -name "*.db" -not -path "./.git/*" | grep -q .; then
            echo "ERROR: SQLite .db files found in repository tree"
            find . -name "*.db" -not -path "./.git/*"
            exit 1
          fi
          echo "OK: No .db files committed"

      - name: No .env files committed (only .env.example allowed)
        run: |
          if find . -name ".env" -not -path "./.git/*" | grep -q .; then
            echo "ERROR: .env file found — this may contain real secrets"
            exit 1
          fi
          echo "OK: No .env secrets committed"

      - name: LICENSE file exists
        run: |
          test -f LICENSE || (echo "ERROR: LICENSE file missing" && exit 1)
          echo "OK: LICENSE present"
