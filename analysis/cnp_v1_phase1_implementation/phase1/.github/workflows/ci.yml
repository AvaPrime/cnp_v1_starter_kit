name: CI

# TOOLING NOTE: Coverage gated by pytest-cov (Python), NOT Istanbul/NYC (JS).
# Phase 1 gate: --cov-fail-under=60
# Raise per phase: P2=70, P3=80, P4=85

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - run: pip install ruff
      - run: ruff check gateway/app --select E,F,W,I,UP,B,C4

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - run: pip install -r gateway/requirements.txt mypy
      - run: mypy gateway/app --ignore-missing-imports --no-strict-optional

  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - run: pip install bandit pip-audit
      # -ll = only report MEDIUM and HIGH severity; production code only
      - run: bandit -r gateway/app -ll --exclude gateway/tests
      - run: pip-audit -r gateway/requirements.txt

  test:
    name: Test + Coverage (pytest-cov >= 60%)
    runs-on: ubuntu-latest
    env:
      BOOTSTRAP_TOKEN: ci-bootstrap-token-not-real
      ADMIN_TOKEN: ci-admin-token-not-real
      GATEWAY_DB_PATH: ":memory:"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - run: pip install -r gateway/requirements.txt
      - name: pytest with coverage gate
        working-directory: gateway
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            -v --tb=short
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: gateway/coverage.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t cnp-gateway:ci -f gateway/Dockerfile gateway/
      - name: Smoke test
        run: |
          docker run --rm -d \
            -e BOOTSTRAP_TOKEN=ci-token -e ADMIN_TOKEN=ci-admin \
            -p 8080:8080 --name cnp-ci-smoke cnp-gateway:ci
          sleep 3
          curl -sf http://localhost:8080/api/health
          docker stop cnp-ci-smoke

  hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No .db files committed
        run: |
          find . -name "*.db" -not -path "./.git/*" | grep . && echo "ERROR: .db files found" && exit 1 || echo "OK"
      - name: LICENSE present
        run: test -f LICENSE
      - name: SECURITY.md present
        run: test -f SECURITY.md || echo "WARNING: SECURITY.md missing (required for Phase 2)"
